<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Example</title>
    <link rel="stylesheet" href="lektion-2.css">
</head>

<body>
    <article>
        <img src="https://picsum.photos/300/200" width="300" height="200" />
        <header>
            <h2>Card Title</h2>
            <p>Posted <time datetime="2022-01-01">2022-01-01</time> by <strong>Juan Dela
                    Cruz</strong></p>
        </header>

        <p>This is a <i>description</i> inside the card.</p>

        <footer>
            <button type="button">Secondary</button>
            <button type="button">Default</button>
        </footer>
    </article>
</body>

</html>
